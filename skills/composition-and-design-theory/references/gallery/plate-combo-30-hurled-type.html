<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Hurled Type</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#f0ece1;color:#16140d;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .top{position:absolute;left:96px;right:96px;top:80px;z-index:5;display:flex;justify-content:space-between;align-items:baseline;
    font-weight:600;font-size:17px;letter-spacing:.22em;text-transform:uppercase;
    border-bottom:1.5px solid #16140d;padding-bottom:16px}
  .top .r{color:#d8412a}
  /* the word at rest: calm, level, settled low */
  .rest{position:absolute;left:120px;top:690px;margin:0;font-weight:500;font-size:150px;
    line-height:1;letter-spacing:-.02em;color:#16140d}
  .restlab{position:absolute;left:128px;top:872px;font-weight:600;font-size:15px;
    letter-spacing:.28em;text-transform:uppercase;color:rgba(22,20,13,.5)}
  /* the same word, hurled: a steep stroboscopic streak */
  .hurl{position:absolute;left:150px;top:735px;transform-origin:left center;transform:rotate(-27deg)}
  .hurl span{position:absolute;left:0;top:-115px;font-weight:700;font-size:230px;line-height:1;
    letter-spacing:-.05em;color:#d8412a;white-space:nowrap}
  .hurllab{position:absolute;right:150px;top:150px;font-weight:600;font-size:15px;
    letter-spacing:.28em;text-transform:uppercase;color:#d8412a;transform:rotate(-27deg);transform-origin:right center}
  .foot{position:absolute;left:96px;right:96px;bottom:80px;z-index:5;border-top:1.5px solid #16140d;padding-top:18px;
    display:flex;justify-content:space-between;align-items:flex-end}
  .kick{font-weight:600;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:rgba(22,20,13,.55)}
  .kick b{color:#d8412a;font-weight:700}
  .cap{max-width:680px;text-align:right;font-size:20px;line-height:1.45;color:#3a362c}
  .cap b{color:#16140d;font-weight:600}
</style></head>
<body><div class="plate">
  <div class="top"><div>Composition &#8470; 30</div><div class="r">Hurled Type</div></div>

  <div class="hurl">
    <span style="opacity:.10">REST</span>
    <span style="left:205px;opacity:.24">REST</span>
    <span style="left:410px;opacity:.52">REST</span>
    <span style="left:615px;opacity:1">REST</span>
  </div>
  <div class="hurllab">in violent motion &rarr;</div>

  <h1 class="rest">REST</h1>
  <div class="restlab">&mdash; at rest</div>

  <div class="foot">
    <div class="kick">JUXTAPOSITION &middot; Type-as-image <b>&#10007;</b> Diagonal</div>
    <div class="cap"><b>One word, two states.</b> The same letters lie level and calm, then are hurled up a steep diagonal &mdash; stillness against violent motion.</div>
  </div>
</div></body></html>
