<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>The Glyph</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#ebe6d8;color:#16140d;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .top{position:absolute;left:96px;right:96px;top:80px;display:flex;justify-content:space-between;align-items:baseline;
    font-weight:600;font-size:17px;letter-spacing:.22em;text-transform:uppercase}
  .top .r{color:#d8412a}
  svg{position:absolute;inset:0}
  .foot{position:absolute;left:96px;right:96px;bottom:80px;
    display:flex;justify-content:space-between;align-items:flex-end}
  .kick{font-weight:600;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:rgba(22,20,13,.55)}
  .kick b{color:#d8412a;font-weight:700}
  .cap{max-width:560px;text-align:right;font-size:20px;line-height:1.45;color:#3a362c}
  .cap b{color:#16140d;font-weight:600}
</style></head>
<body><div class="plate">
  <div class="top"><div>Composition № 27</div><div class="r">The Glyph</div></div>
  <svg viewBox="0 0 1920 1080">
    <!-- faint construction scaffold: two circles + cross -->
    <g fill="none" stroke="#16140d" stroke-opacity=".16" stroke-width="1.5">
      <circle cx="820" cy="100" r="520"/>
      <circle cx="820" cy="840" r="520"/>
      <circle cx="820" cy="470" r="118"/>
      <line x1="820" y1="-40" x2="820" y2="1080"/>
      <line x1="120" y1="470" x2="1520" y2="470"/>
    </g>
    <g stroke="#16140d" stroke-opacity=".22" stroke-width="1.5">
      <circle cx="454.6" cy="470" r="5" fill="#16140d" fill-opacity=".3" stroke="none"/>
      <circle cx="1185.4" cy="470" r="5" fill="#16140d" fill-opacity=".3" stroke="none"/>
    </g>
    <!-- the derived essence-mark -->
    <path d="M454.6 470 A520 520 0 0 0 1185.4 470 A520 520 0 0 0 454.6 470 Z"
      fill="none" stroke="#16140d" stroke-width="10" stroke-linejoin="round"/>
    <circle cx="820" cy="470" r="118" fill="none" stroke="#16140d" stroke-width="10"/>
    <circle cx="820" cy="470" r="44" fill="#d8412a"/>
  </svg>
  <div class="foot">
    <div class="kick">MIX · Sign-types <b>×</b> Reduction <b>×</b> Generative</div>
    <div class="cap"><b>An essence-mark, visibly derived.</b> One icon reduced to its irreducible form, built on a circle-and-line rule that still shows faintly behind it.</div>
  </div>
</div></body></html>
