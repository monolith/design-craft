<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Figure / Ground</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;position:relative;overflow:hidden;
    font-family:'Space Grotesk',sans-serif;
    background:linear-gradient(90deg,#141310 50%,#ece7da 50%)}
  .circle{position:absolute;left:660px;top:240px;width:600px;height:600px;border-radius:50%;
    background:linear-gradient(90deg,#ece7da 50%,#141310 50%)}
  .dot{position:absolute;left:936px;top:516px;width:48px;height:48px;border-radius:50%;background:#d8412a}
  h1{position:absolute;inset:0;margin:0;display:flex;justify-content:center;align-items:center;
    text-align:center;font-weight:700;font-size:210px;letter-spacing:-.04em;color:#f2efe6;mix-blend-mode:difference}
  .lab{position:absolute;top:54px;left:64px;color:#ece7da;mix-blend-mode:difference;
    font-weight:500;font-size:18px;letter-spacing:.22em;text-transform:uppercase}
  .cap{position:absolute;bottom:56px;left:0;right:0;text-align:center;color:#ece7da;mix-blend-mode:difference;
    font-weight:400;font-size:19px;letter-spacing:.02em}
</style></head>
<body><div class="plate">
  <div class="circle"></div>
  <div class="dot"></div>
  <h1>FIGURE / GROUND</h1>
  <div class="lab">Composition № 02</div>
  <div class="cap">What reads as figure vs. ground is engineered — convexity, size, surroundedness bias the eye. The same circle is figure on both sides.</div>
</div></body></html>
