<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>The Carved Void</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#ece7da;color:#16140d;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .lab{position:absolute;top:64px;left:96px;font-weight:600;font-size:16px;letter-spacing:.24em;text-transform:uppercase}
  .name{position:absolute;top:64px;right:96px;font-weight:600;font-size:16px;letter-spacing:.24em;text-transform:uppercase;color:#d8412a}
  .tag{position:absolute;bottom:120px;left:96px;font-weight:600;font-size:14px;letter-spacing:.24em;text-transform:uppercase;color:rgba(22,20,13,.5)}
  .cap{position:absolute;bottom:62px;left:96px;right:760px;font-weight:400;font-size:20px;line-height:1.45;color:#3a3527}
  .cap b{color:#d8412a;font-weight:600}
  svg{position:absolute;inset:0}
</style></head>
<body><div class="plate">
  <div class="lab">Composition № 20</div>
  <div class="name">The Carved Void</div>
  <svg viewBox="0 0 1920 1080">
    <!-- one solid field -->
    <rect x="380" y="150" width="1160" height="730" fill="#16140d"/>
    <!-- the figure is the absence punched out of it -->
    <path d="M960,162 L1195,442 L1044,442 L1044,868 L876,868 L876,442 L725,442 Z" fill="#ece7da"/>
  </svg>
  <div class="tag">Mix · Figure-ground × Reduction</div>
  <div class="cap">The arrow is never drawn — it is the <b>absence cut from the solid</b>. Negative space is the figure; the mass is only its frame.</div>
</div></body></html>
