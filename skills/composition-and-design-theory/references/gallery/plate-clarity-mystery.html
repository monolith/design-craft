<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Clarity / Mystery</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;position:relative;overflow:hidden;
    font-family:'Space Grotesk',sans-serif;display:flex}
  .half{width:960px;height:1080px;position:relative}
  .L{background:#ece7da;color:#16140d}
  .R{background:#0c0b0a;color:#cfc8b8}
  .seam{position:absolute;left:960px;top:0;width:2px;height:1080px;background:rgba(0,0,0,.25);z-index:5}
  .word{position:absolute;bottom:150px;left:0;right:0;text-align:center;margin:0;font-weight:700;font-size:96px;letter-spacing:-.03em}
  .sub{position:absolute;bottom:104px;left:0;right:0;text-align:center;font-weight:400;font-size:21px;letter-spacing:.02em;opacity:.8}
  .R .word{color:#b8a98c;opacity:.85}
  .lab{position:absolute;top:54px;left:64px;z-index:6;color:#6b6456;font-weight:600;font-size:17px;letter-spacing:.24em;text-transform:uppercase}
  svg{position:absolute;inset:0}
</style></head>
<body><div class="plate">
  <div class="half L">
    <svg viewBox="0 0 960 1080">
      <circle cx="480" cy="430" r="175" fill="#ece7da" stroke="#16140d" stroke-width="10"/>
      <circle cx="480" cy="430" r="80" fill="#2747b0"/>
      <circle cx="480" cy="430" r="36" fill="#16140d"/>
      <circle cx="456" cy="406" r="14" fill="#ece7da"/>
    </svg>
    <h2 class="word">CLARITY</h2>
    <div class="sub">States it plainly. Blunt, honest.</div>
  </div>
  <div class="half R">
    <svg viewBox="0 0 960 1080">
      <defs><radialGradient id="veil" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#0c0b0a" stop-opacity="0"/>
        <stop offset="60%" stop-color="#0c0b0a" stop-opacity="0"/>
        <stop offset="100%" stop-color="#0c0b0a" stop-opacity="1"/></radialGradient></defs>
      <circle cx="480" cy="430" r="175" fill="#221f1a" stroke="#3a352c" stroke-width="7"/>
      <circle cx="480" cy="430" r="80" fill="#2c3a55"/>
      <circle cx="480" cy="430" r="36" fill="#0c0b0a"/>
      <circle cx="458" cy="408" r="12" fill="#d9cfb6"/>
      <rect x="0" y="0" width="960" height="1080" fill="url(#veil)"/>
    </svg>
    <h2 class="word">MYSTERY</h2>
    <div class="sub">Withholds. Makes you look twice.</div>
  </div>
  <div class="seam"></div>
  <div class="lab">Composition № 07 — Kidd</div>
</div></body></html>
