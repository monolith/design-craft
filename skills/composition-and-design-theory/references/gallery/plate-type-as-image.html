<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Type is Image</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#15130f;overflow:hidden;
    font-family:'Space Grotesk',sans-serif;position:relative;color:#efe7d4}
  .amp{position:absolute;top:50%;font-family:'Fraunces',serif;font-weight:600;font-size:1760px;
    line-height:.7;letter-spacing:-.03em;user-select:none}
  .amp.echo{right:54px;transform:translateY(-50%);color:#d8412a}
  .amp.main{right:90px;transform:translateY(-50%);color:#efe7d4}
  .lab{position:absolute;top:60px;left:96px;font-weight:600;font-size:16px;letter-spacing:.24em;text-transform:uppercase;color:#9a9486}
  .title{position:absolute;left:96px;bottom:230px;margin:0;font-weight:700;font-size:128px;line-height:.9;letter-spacing:-.04em}
  .title b{color:#d8412a;font-weight:700}
  .cap{position:absolute;left:98px;bottom:96px;width:760px;font-weight:400;font-size:21px;line-height:1.5;color:#b7b1a3}
</style></head>
<body><div class="plate">
  <div class="amp echo">&amp;</div>
  <div class="amp main">&amp;</div>
  <div class="lab">Composition № 04 — after Scher</div>
  <h1 class="title">Type is<br><b>image.</b></h1>
  <div class="cap">Scaled past reading, the letterform stops being read and becomes pure form — type performing, not labelling.</div>
</div></body></html>
