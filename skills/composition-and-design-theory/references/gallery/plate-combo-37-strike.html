<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>The Strike</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#15130f;color:#efe7d4;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .lab{position:absolute;top:64px;left:96px;font-weight:500;font-size:16px;letter-spacing:.24em;
    text-transform:uppercase;color:rgba(239,231,212,.6)}
  .name{position:absolute;top:64px;right:96px;font-weight:500;font-size:16px;letter-spacing:.24em;
    text-transform:uppercase;color:#d8412a}
  .tag{position:absolute;bottom:172px;left:96px;font-weight:500;font-size:14px;letter-spacing:.24em;
    text-transform:uppercase;color:rgba(239,231,212,.4)}
  .cap{position:absolute;bottom:62px;left:96px;width:680px;font-family:'Inter',sans-serif;
    font-size:20px;line-height:1.45;color:rgba(239,231,212,.72)}
  .cap b{color:#d8412a;font-weight:600}
  svg{position:absolute;inset:0}
</style></head>
<body><div class="plate">
  <svg viewBox="0 0 1920 1080">
    <line x1="960" y1="500" x2="960" y2="580" stroke="#efe7d4" stroke-opacity=".1" stroke-width="1"/>
    <line x1="920" y1="540" x2="1000" y2="540" stroke="#efe7d4" stroke-opacity=".1" stroke-width="1"/>
    <rect x="466" y="517" width="1018" height="46" rx="5" transform="rotate(-30 960 540)" fill="#d8412a"/>
  </svg>
  <div class="lab">Composition № 37</div>
  <div class="name">The Strike</div>
  <div class="tag">Juxtaposition · Hierarchy + Diagonal ✗ Reduction</div>
  <div class="cap"><b>One bold diagonal violates a vast, silent void.</b> Maximum drama from minimum means — the loud gesture owes its force to the emptiness around it.</div>
</div></body></html>
