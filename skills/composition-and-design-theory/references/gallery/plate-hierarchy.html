<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Hierarchy & Contrast</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#efe9dc;color:#16140d;
    font-family:'Inter',sans-serif;position:relative;overflow:hidden;padding:80px 96px}
  .lab{display:flex;justify-content:space-between;align-items:baseline;font-weight:600;font-size:17px;
    letter-spacing:.22em;text-transform:uppercase;border-bottom:2px solid #16140d;padding-bottom:16px}
  .lab .r{color:#d8412a}
  h2{position:absolute;left:90px;top:300px;margin:0;font-weight:800;font-size:300px;line-height:.78;letter-spacing:-.05em}
  .n{position:absolute;display:grid;place-items:center;border-radius:50%;background:#d8412a;color:#efe9dc;
    font-weight:700;font-family:'Space Grotesk',sans-serif}
  .n1{left:96px;top:300px;width:54px;height:54px;font-size:26px}
  .t2{position:absolute;left:1150px;top:360px;display:flex;align-items:center;gap:24px}
  .t2 .n{position:static;width:42px;height:42px;font-size:20px}
  .t2 h3{margin:0;font-weight:600;font-size:56px;line-height:.98;letter-spacing:-.02em}
  .t3{position:absolute;left:1150px;top:560px;display:flex;align-items:flex-start;gap:24px}
  .t3 .n{position:static;width:32px;height:32px;font-size:16px;margin-top:4px}
  .t3 p{margin:0;font-weight:400;font-size:24px;line-height:1.4;max-width:24ch;color:#3a3527}
  .foot{position:absolute;left:96px;right:96px;bottom:80px;border-top:2px solid #16140d;padding-top:18px;
    display:flex;justify-content:space-between;align-items:baseline}
  .foot h1{margin:0;font-family:'Fraunces',serif;font-weight:600;font-size:44px;letter-spacing:-.01em}
  .foot span{font-size:19px;color:#3a3527}
</style></head>
<body><div class="plate">
  <div class="lab"><div>Composition № 09</div><div class="r">Hierarchy &amp; Contrast</div></div>
  <h2>SCALE</h2>
  <span class="n n1">1</span>
  <div class="t2"><span class="n">2</span><h3>sets the order<br>of reading</h3></div>
  <div class="t3"><span class="n">3</span><p>and everything else falls into rank beneath it.</p></div>
  <div class="foot"><h1>One dominant element.</h1><span>Contrast in size and weight tells the eye where to go — and in what order.</span></div>
</div></body></html>
