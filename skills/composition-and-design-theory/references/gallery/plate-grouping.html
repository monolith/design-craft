<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Gestalt Grouping</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#ece6d8;color:#16140d;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .lab{position:absolute;top:64px;left:96px;font-weight:600;font-size:17px;letter-spacing:.24em;text-transform:uppercase}
  h1{position:absolute;top:96px;left:96px;margin:0;font-weight:700;font-size:74px;letter-spacing:-.03em}
  .cap{position:absolute;bottom:62px;left:96px;right:96px;font-weight:400;font-size:20px;line-height:1.45;color:#3a3527}
  .cap b{color:#d8412a;font-weight:600}
  svg{position:absolute;inset:0}
</style></head>
<body><div class="plate">
  <div class="lab">Composition № 10</div>
  <h1>The eye groups.</h1>
  <svg id="g" viewBox="0 0 1920 1080"></svg>
  <div class="cap"><b>Proximity</b> binds the four clusters; <b>similarity</b> pulls the red dots into one ring across them. Separate marks, read as wholes.</div>
</div>
<script>
  const NS="http://www.w3.org/2000/svg", svg=document.getElementById("g");
  function add(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);svg.appendChild(e);}
  const ink="#16140d", red="#d8412a";
  const per=6, step=58, gap=110, block=(per-1)*step, total=block*2+gap;
  const ox=(1920-total)/2, oy=210;
  const fcx=ox+total/2, fcy=oy+total/2, R=total*0.42;
  for(let cl=0;cl<4;cl++){
    const bx=ox+(cl%2)*(block+gap), by=oy+((cl/2)|0)*(block+gap);
    for(let r=0;r<per;r++)for(let c=0;c<per;c++){
      const x=bx+c*step, y=by+r*step, d=Math.hypot(x-fcx,y-fcy), onRing=d>R-30&&d<R+30;
      add("circle",{cx:x,cy:y,r:onRing?16:12,fill:onRing?red:ink,"fill-opacity":onRing?1:0.88});
    }
  }
</script>
</body></html>
