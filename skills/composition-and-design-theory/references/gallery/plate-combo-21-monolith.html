<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>The Monolith</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#f0ece1;color:#16140d;
    font-family:'Inter',sans-serif;position:relative;overflow:hidden}
  .lab{position:absolute;top:64px;left:96px;font-weight:600;font-size:16px;letter-spacing:.24em;text-transform:uppercase}
  .name{position:absolute;top:64px;right:96px;font-weight:600;font-size:16px;letter-spacing:.24em;text-transform:uppercase;color:#d8412a}
  .mono{position:absolute;left:0;right:0;top:286px;margin:0;text-align:center;
    font-weight:800;font-size:520px;line-height:1;letter-spacing:-.04em}
  .mono i{font-style:normal;color:#d8412a}
  .tag{position:absolute;bottom:120px;left:96px;font-weight:600;font-size:14px;letter-spacing:.24em;text-transform:uppercase;color:rgba(22,20,13,.5)}
  .cap{position:absolute;bottom:62px;left:96px;right:760px;font-weight:400;font-size:20px;line-height:1.45;color:#3a3527}
  .cap b{color:#d8412a;font-weight:600}
</style></head>
<body><div class="plate">
  <div class="lab">Composition № 21</div>
  <div class="name">The Monolith</div>
  <h1 class="mono">ONE<i>.</i></h1>
  <div class="tag">Mix · Type-as-image × Reduction × Hierarchy</div>
  <div class="cap">One colossal word owns the frame. <b>Vast space and a single full stop</b> make a hierarchy of exactly one — type as the whole image.</div>
</div></body></html>
