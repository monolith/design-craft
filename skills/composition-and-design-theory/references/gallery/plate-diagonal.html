<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Diagonal / Dynamism</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#ece6d7;color:#141310;
    font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
  .wedge{position:absolute;right:120px;top:-40px;width:560px;height:560px;background:#d8341f;
    clip-path:polygon(50% 0,100% 100%,0 100%);transform:rotate(18deg)}
  .band{position:absolute;left:-200px;top:300px;width:2600px;height:300px;background:#141310;
    transform:rotate(-15deg);transform-origin:left center;
    display:flex;align-items:center;padding-left:280px;box-sizing:border-box;color:#f3efe4}
  .band .k{font-weight:500;font-size:19px;letter-spacing:.34em;text-transform:uppercase;color:#e7b6a6;margin-bottom:10px}
  .band h1{margin:0;font-weight:700;font-size:94px;line-height:.86;letter-spacing:-.04em;white-space:nowrap}
  .ring{position:absolute;left:150px;bottom:120px;width:200px;height:200px;border:18px solid #141310;border-radius:50%}
  .dot{position:absolute;left:470px;bottom:150px;width:110px;height:110px;border-radius:50%;background:#d8341f}
  .lab{position:absolute;bottom:60px;left:64px;font-weight:500;font-size:18px;letter-spacing:.22em;text-transform:uppercase}
  .cap{position:absolute;right:96px;bottom:90px;width:420px;text-align:right;font-weight:400;font-size:20px;line-height:1.45}
</style></head>
<body><div class="plate">
  <div class="wedge"></div>
  <div class="band"><div><div class="k">Lissitzky · Beall</div><h1>DIAGONAL IS DYNAMIC</h1></div></div>
  <div class="ring"></div>
  <div class="dot"></div>
  <div class="lab">Composition № 03</div>
  <div class="cap">The right angle is static. Tilt the axis and the field comes alive — thrust and counter-thrust.</div>
</div></body></html>
