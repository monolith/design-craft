<!doctype html><html lang="en"><head><meta charset="utf-8">
<!-- size: 1920x1080 -->
<title>Grid / Order</title>
<link rel="stylesheet" href="fonts.css">
<style>
  html,body{margin:0;padding:0}
  .plate{box-sizing:border-box;width:1920px;height:1080px;background:#f0ece1;color:#16140d;
    font-family:'Inter',sans-serif;position:relative;overflow:hidden;padding:80px 96px}
  .grid-lines{position:absolute;inset:80px 96px;display:grid;grid-template-columns:repeat(12,1fr);gap:24px;pointer-events:none}
  .grid-lines span{border-left:1px solid rgba(22,20,13,.10)}
  .top{position:absolute;left:96px;right:96px;top:80px;display:flex;justify-content:space-between;align-items:baseline;
    font-weight:600;font-size:18px;letter-spacing:.22em;text-transform:uppercase;
    border-bottom:2px solid #16140d;padding-bottom:16px}
  .top .r{color:#d8412a}
  h1{position:absolute;left:96px;top:250px;margin:0;font-weight:800;font-size:172px;line-height:.85;letter-spacing:-.045em}
  .block{position:absolute;right:96px;top:230px;width:420px;height:470px;background:#d8412a}
  .deck{position:absolute;left:96px;bottom:170px;width:620px;font-size:21px;line-height:1.5;font-weight:400}
  .num{position:absolute;right:96px;bottom:150px;font-weight:800;font-size:170px;line-height:.8;text-align:right}
  .foot{position:absolute;left:96px;right:96px;bottom:80px;display:flex;justify-content:space-between;align-items:baseline;
    font-weight:500;font-size:16px;letter-spacing:.16em;text-transform:uppercase;
    border-top:2px solid #16140d;padding-top:16px}
  .foot .muted{color:rgba(22,20,13,.5)}
</style></head>
<body><div class="plate">
  <div class="grid-lines"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="top"><div>Composition № 01</div><div class="r">The Grid</div></div>
  <h1>ORDER IS<br>A DECISION</h1>
  <div class="block"></div>
  <div class="num">01</div>
  <div class="deck">The grid divides the surface into fields, so every element — type, image, colour — is disposed within one rational system. Objectivity over taste.</div>
  <div class="foot"><div>Müller-Brockmann · 1981</div><div class="muted">Structure first, then the marks</div></div>
</div></body></html>
